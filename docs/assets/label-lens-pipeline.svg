<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Label Lens evidence-producing perception and review pipeline</title>
<desc id="desc">Machine perception pipeline on the left and authenticated seller-to-agent workflow on the right, using internal review language only.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#f7f4fb"/><stop offset="1" stop-color="#fffaf5"/></linearGradient>
  <linearGradient id="purple" x1="0" x2="1"><stop stop-color="#3f1d52"/><stop offset="1" stop-color="#6f3a83"/></linearGradient>
  <linearGradient id="teal" x1="0" x2="1"><stop stop-color="#168c94"/><stop offset="1" stop-color="#35b9b2"/></linearGradient>
  <style>
    .title{font:700 46px Arial,sans-serif;fill:#2b163a}.section{font:700 28px Arial,sans-serif;fill:#111}.h{font:700 22px Arial,sans-serif;fill:#1c1c1c}.p{font:400 17px Arial,sans-serif;fill:#333}.small{font:400 14px Arial,sans-serif;fill:#555}.label{font:700 15px Arial,sans-serif;fill:#2b163a}.card{fill:#fff;stroke:#dacfe2;stroke-width:2}.line{stroke:#6f3a83;stroke-width:4;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6 0 12z" fill="#6f3a83"/></marker>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<text x="48" y="70" class="title">Label Lens: Evidence-Producing Perception and Review</text>
<text x="48" y="103" class="p">A bounded domestic-wine prototype that separates observation, seller evidence, deterministic checks, and internal human review.</text>

<text x="48" y="155" class="section">1. Perception pipeline</text>
<text x="48" y="185" class="small">Machine analysis produces evidence; it does not make the final decision.</text>

<rect x="48" y="220" width="305" height="150" rx="18" class="card"/>
<circle cx="100" cy="275" r="34" fill="url(#teal)"/><path d="M68 275c14-25 46-25 60 0-14 25-46 25-60 0z" fill="none" stroke="#2b163a" stroke-width="4"/><circle cx="98" cy="275" r="9" fill="#2b163a"/>
<text x="145" y="255" class="h">Fresh visual observation</text><text x="145" y="285" class="p">Each run detects salient regions</text><text x="145" y="309" class="p">without reusing a prior answer.</text><text x="145" y="338" class="small">Regions, geometry, uncertainty</text>

<rect x="420" y="220" width="305" height="150" rx="18" class="card"/>
<rect x="454" y="250" width="58" height="76" rx="5" fill="#f6f0f8" stroke="#6f3a83" stroke-width="3"/><path d="M465 269h35M465 285h33M465 301h27" stroke="#8b6b9b" stroke-width="4"/>
<text x="535" y="255" class="h">OCR as skeptical reviewer</text><text x="535" y="285" class="p">Text extraction tests visual</text><text x="535" y="309" class="p">proposals without assuming truth.</text><text x="535" y="338" class="small">Typed observations + provenance</text>

<rect x="48" y="420" width="305" height="150" rx="18" class="card"/>
<g stroke="#9b7aaa" stroke-width="2"><line x1="93" y1="465" x2="150" y2="450"/><line x1="150" y1="450" x2="205" y2="490"/><line x1="93" y1="465" x2="138" y2="520"/><line x1="75" y1="525" x2="138" y2="520"/><line x1="138" y1="520" x2="205" y2="490"/></g><g><circle cx="93" cy="465" r="11" fill="#f47d31"/><circle cx="150" cy="450" r="11" fill="#6f3a83"/><circle cx="205" cy="490" r="11" fill="#f47d31"/><circle cx="138" cy="520" r="11" fill="#35b9b2"/><circle cx="75" cy="525" r="11" fill="#6f3a83"/></g>
<text x="180" y="455" class="h">Semantic scene graph</text><text x="180" y="485" class="p">Internal relationships connect</text><text x="180" y="509" class="p">candidate regions and categories.</text><text x="180" y="538" class="small">brand-bearing vs. producer-address</text>

<rect x="420" y="420" width="305" height="150" rx="18" class="card"/>
<rect x="452" y="451" width="72" height="88" rx="8" fill="#fff" stroke="#6f3a83" stroke-width="3"/><path d="M466 472l9 9 17-18M466 500l9 9 17-18M466 528l9 9 17-18" fill="none" stroke="#168c94" stroke-width="5"/>
<text x="550" y="455" class="h">Deterministic pre-check</text><text x="550" y="485" class="p">Versioned rules evaluate evidence</text><text x="550" y="509" class="p">for supported conditions only.</text><text x="550" y="538" class="small">PASS, WARN, FAIL, NEEDS_REVIEW</text>
<path d="M353 295h52" class="line"/><path d="M572 370v35" class="line"/><path d="M420 495h-52" class="line"/>

<rect x="48" y="620" width="677" height="190" rx="18" class="card"/>
<text x="78" y="655" class="h">Measured failure mechanisms guide improvement</text><text x="78" y="684" class="small">Example Phase 5A attribution categories; counts are diagnostic events, not user scores.</text>
<rect x="78" y="710" width="510" height="34" rx="10" fill="#eee5f1"/><rect x="78" y="710" width="425" height="34" rx="10" fill="url(#purple)"/><text x="90" y="733" fill="#fff" style="font:700 16px Arial">Candidate filtering</text><text x="604" y="733" class="label">73</text>
<rect x="78" y="754" width="510" height="34" rx="10" fill="#eee5f1"/><rect x="78" y="754" width="170" height="34" rx="10" fill="url(#teal)"/><text x="90" y="777" fill="#fff" style="font:700 16px Arial">OCR recognition</text><text x="604" y="777" class="label">29</text>

<text x="825" y="155" class="section">2. Seller-to-agent workflow</text>
<text x="825" y="185" class="small">A real receiving workflow with authenticated roles and immutable records.</text>

<rect x="825" y="220" width="700" height="130" rx="18" class="card"/>
<rect x="855" y="248" width="170" height="75" rx="8" fill="#f8f4fa" stroke="#6f3a83" stroke-width="3"/><rect x="872" y="265" width="52" height="43" rx="4" fill="#fff" stroke="#8b6b9b" stroke-width="2"/><rect x="946" y="265" width="52" height="43" rx="4" fill="#fff" stroke="#8b6b9b" stroke-width="2"/><text x="884" y="319" class="small">Front</text><text x="961" y="319" class="small">Back</text>
<text x="1060" y="260" class="h">Seller package preparation</text><text x="1060" y="290" class="p">Upload front, back, and optional panels.</text><text x="1060" y="314" class="p">Confirm values, uncertainty, and evidence regions.</text>

<rect x="825" y="390" width="700" height="130" rx="18" class="card"/>
<rect x="855" y="420" width="170" height="70" rx="8" fill="#fff" stroke="#6f3a83" stroke-width="3"/><circle cx="880" cy="442" r="7" fill="#f47d31"/><circle cx="880" cy="462" r="7" fill="#35b9b2"/><circle cx="880" cy="482" r="7" fill="#8b6b9b"/><path d="M900 442h95M900 462h80M900 482h90" stroke="#b8a7c1" stroke-width="5"/>
<text x="1060" y="430" class="h">Authenticated agent queue</text><text x="1060" y="460" class="p">Durable receipt and immutable revision.</text><text x="1060" y="484" class="p">Default status: Waiting for agent review.</text>

<rect x="825" y="560" width="700" height="150" rx="18" class="card"/>
<rect x="855" y="590" width="220" height="90" rx="8" fill="#f8f4fa" stroke="#6f3a83" stroke-width="3"/><line x1="965" y1="590" x2="965" y2="680" stroke="#8b6b9b" stroke-width="2"/><text x="870" y="615" class="label">Machine observations</text><text x="987" y="615" class="label">Seller evidence</text><circle cx="930" cy="650" r="22" fill="none" stroke="#168c94" stroke-width="5"/><line x1="915" y1="668" x2="895" y2="686" stroke="#168c94" stroke-width="7"/>
<text x="1105" y="595" class="h">Human-in-the-loop internal review</text><text x="1105" y="625" class="p">Agent inspects seller and machine records separately.</text>
<rect x="1105" y="650" width="190" height="34" rx="17" fill="#f2eaf7" stroke="#8b6b9b"/><text x="1122" y="672" class="label">Changes requested</text><rect x="1310" y="650" width="190" height="34" rx="17" fill="#e7f7f3" stroke="#35b9b2"/><text x="1326" y="672" class="label">Internally accepted</text>
<path d="M1175 350v25" class="line"/><path d="M1175 520v25" class="line"/>

<rect x="825" y="748" width="700" height="62" rx="18" fill="#2b163a"/><text x="850" y="775" fill="#fff" style="font:700 18px Arial">Boundary:</text><text x="955" y="775" fill="#fff" style="font:400 17px Arial">Internal review does not equal TTB, COLA, government, legal, or regulatory approval.</text><text x="850" y="799" fill="#fff" style="font:400 15px Arial">Human reviewers remain authoritative; official determinations remain outside this prototype.</text>
</svg>
