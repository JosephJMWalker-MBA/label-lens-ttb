<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Label Lens evidence and review workflow</title>
<desc id="desc">A clean two-column diagram showing the machine perception pipeline and the authenticated seller-to-agent workflow.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1">
    <stop stop-color="#f8f6fb"/>
    <stop offset="1" stop-color="#fffaf6"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop stop-color="#3b1d4d"/>
    <stop offset="1" stop-color="#72448a"/>
  </linearGradient>
  <linearGradient id="teal" x1="0" x2="1">
    <stop stop-color="#148c95"/>
    <stop offset="1" stop-color="#3bbab2"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2b163a" flood-opacity=".08"/>
  </filter>
  <style>
    .title{font:700 48px Arial,sans-serif;fill:#2b163a}
    .subtitle{font:400 18px Arial,sans-serif;fill:#4b4650}
    .section{font:700 30px Arial,sans-serif;fill:#17131a}
    .sectionSub{font:400 16px Arial,sans-serif;fill:#625d66}
    .step{font:700 15px Arial,sans-serif;fill:#fff}
    .h{font:700 23px Arial,sans-serif;fill:#1d1920}
    .p{font:400 16px Arial,sans-serif;fill:#4d4850}
    .meta{font:600 14px Arial,sans-serif;fill:#6e6872}
    .card{fill:#fff;stroke:#ded5e5;stroke-width:2;filter:url(#shadow)}
    .divider{stroke:#e4dce8;stroke-width:2}
    .arrow{stroke:#7b4a8f;stroke-width:4;fill:none}
    .badge{font:700 14px Arial,sans-serif;fill:#2b163a}
  </style>
</defs>

<rect width="1600" height="900" fill="url(#bg)"/>

<text x="64" y="76" class="title">Label Lens</text>
<text x="346" y="76" class="title" style="font-weight:400">Evidence-Producing Perception and Review</text>
<text x="64" y="112" class="subtitle">Machine observations, seller evidence, deterministic checks, and internal human review remain separate and traceable.</text>

<line x1="800" y1="162" x2="800" y2="775" class="divider"/>

<text x="64" y="175" class="section">Perception pipeline</text>
<text x="64" y="205" class="sectionSub">The machine produces bounded evidence. It does not make the final decision.</text>

<g>
  <rect x="64" y="245" width="670" height="112" rx="20" class="card"/>
  <circle cx="112" cy="301" r="28" fill="url(#teal)"/>
  <path d="M86 301c13-21 39-21 52 0-13 21-39 21-52 0z" fill="none" stroke="#2b163a" stroke-width="4"/>
  <circle cx="112" cy="301" r="8" fill="#2b163a"/>
  <circle cx="178" cy="275" r="16" fill="#5e316f"/><text x="173" y="281" class="step">1</text>
  <text x="210" y="284" class="h">Fresh visual observation</text>
  <text x="210" y="312" class="p">Detect salient regions on each run without reusing a prior answer.</text>
  <text x="210" y="337" class="meta">Regions • geometry • uncertainty</text>
</g>

<path d="M399 357v24" class="arrow"/><path d="M390 374l9 10 9-10" fill="none" stroke="#7b4a8f" stroke-width="4"/>

<g>
  <rect x="64" y="386" width="670" height="112" rx="20" class="card"/>
  <rect x="88" y="414" width="52" height="66" rx="7" fill="#f5eff7" stroke="#6e3b80" stroke-width="3"/>
  <path d="M99 432h30M99 448h28M99 464h22" stroke="#8a6a97" stroke-width="4"/>
  <circle cx="178" cy="416" r="16" fill="#5e316f"/><text x="173" y="422" class="step">2</text>
  <text x="210" y="425" class="h">OCR as a skeptical reviewer</text>
  <text x="210" y="453" class="p">Test visual proposals without assuming the text is correct.</text>
  <text x="210" y="478" class="meta">Typed observations • provenance • NOT_OBSERVED</text>
</g>

<path d="M399 498v24" class="arrow"/><path d="M390 515l9 10 9-10" fill="none" stroke="#7b4a8f" stroke-width="4"/>

<g>
  <rect x="64" y="527" width="670" height="112" rx="20" class="card"/>
  <g stroke="#9a7aa7" stroke-width="2">
    <line x1="94" y1="570" x2="132" y2="553"/><line x1="132" y1="553" x2="162" y2="582"/>
    <line x1="94" y1="570" x2="126" y2="606"/><line x1="126" y1="606" x2="162" y2="582"/>
  </g>
  <circle cx="94" cy="570" r="9" fill="#ef7b31"/><circle cx="132" cy="553" r="9" fill="#6d3d80"/>
  <circle cx="162" cy="582" r="9" fill="#ef7b31"/><circle cx="126" cy="606" r="9" fill="#31b2ad"/>
  <circle cx="178" cy="557" r="16" fill="#5e316f"/><text x="173" y="563" class="step">3</text>
  <text x="210" y="566" class="h">Semantic evidence relationships</text>
  <text x="210" y="594" class="p">Connect candidate regions to supported label categories.</text>
  <text x="210" y="619" class="meta">Example: brand-bearing vs. producer-address</text>
</g>

<path d="M399 639v24" class="arrow"/><path d="M390 656l9 10 9-10" fill="none" stroke="#7b4a8f" stroke-width="4"/>

<g>
  <rect x="64" y="668" width="670" height="112" rx="20" class="card"/>
  <rect x="88" y="694" width="58" height="66" rx="8" fill="#fff" stroke="#6e3b80" stroke-width="3"/>
  <path d="M101 711l8 8 15-17M101 731l8 8 15-17M101 751l8 8 15-17" fill="none" stroke="#168c95" stroke-width="4"/>
  <circle cx="178" cy="698" r="16" fill="#5e316f"/><text x="173" y="704" class="step">4</text>
  <text x="210" y="707" class="h">Deterministic pre-check</text>
  <text x="210" y="735" class="p">Versioned rules evaluate only the evidence they support.</text>
  <text x="210" y="760" class="meta">PASS • WARN • FAIL • NEEDS_REVIEW • not_run</text>
</g>

<text x="864" y="175" class="section">Seller-to-agent workflow</text>
<text x="864" y="205" class="sectionSub">Authenticated roles preserve an immutable receiving and review record.</text>

<g>
  <rect x="864" y="245" width="670" height="112" rx="20" class="card"/>
  <rect x="890" y="273" width="92" height="58" rx="8" fill="#f7f2f9" stroke="#6e3b80" stroke-width="3"/>
  <rect x="902" y="285" width="28" height="34" rx="4" fill="#fff" stroke="#9a7aa7" stroke-width="2"/>
  <rect x="942" y="285" width="28" height="34" rx="4" fill="#fff" stroke="#9a7aa7" stroke-width="2"/>
  <circle cx="1010" cy="275" r="16" fill="#ef7b31"/><text x="1005" y="281" class="step">1</text>
  <text x="1042" y="284" class="h">Seller package preparation</text>
  <text x="1042" y="312" class="p">Upload panels; confirm values, uncertainty, and evidence regions.</text>
  <text x="1042" y="337" class="meta">Browser draft • explicit panel decisions • reviewed evidence</text>
</g>

<path d="M1199 357v24" class="arrow"/><path d="M1190 374l9 10 9-10" fill="none" stroke="#7b4a8f" stroke-width="4"/>

<g>
  <rect x="864" y="386" width="670" height="112" rx="20" class="card"/>
  <rect x="890" y="414" width="92" height="58" rx="8" fill="#fff" stroke="#6e3b80" stroke-width="3"/>
  <circle cx="907" cy="433" r="6" fill="#ef7b31"/><circle cx="907" cy="451" r="6" fill="#31b2ad"/>
  <path d="M921 433h45M921 451h38" stroke="#b09bb9" stroke-width="4"/>
  <circle cx="1010" cy="416" r="16" fill="#ef7b31"/><text x="1005" y="422" class="step">2</text>
  <text x="1042" y="425" class="h">Immutable submission and receipt</text>
  <text x="1042" y="453" class="p">Persist the package revision before reporting submission success.</text>
  <text x="1042" y="478" class="meta">Revision ID • checksum • provenance • Waiting for agent review</text>
</g>

<path d="M1199 498v24" class="arrow"/><path d="M1190 515l9 10 9-10" fill="none" stroke="#7b4a8f" stroke-width="4"/>

<g>
  <rect x="864" y="527" width="670" height="112" rx="20" class="card"/>
  <rect x="890" y="555" width="92" height="58" rx="8" fill="#fff" stroke="#6e3b80" stroke-width="3"/>
  <circle cx="907" cy="572" r="6" fill="#ef7b31"/><circle cx="907" cy="589" r="6" fill="#31b2ad"/>
  <path d="M921 572h45M921 589h34" stroke="#b09bb9" stroke-width="4"/>
  <circle cx="1010" cy="557" r="16" fill="#ef7b31"/><text x="1005" y="563" class="step">3</text>
  <text x="1042" y="566" class="h">Authenticated agent queue</text>
  <text x="1042" y="594" class="p">Agents see waiting submissions; seller-local drafts remain private.</text>
  <text x="1042" y="619" class="meta">Role checks • owner isolation • stable queue ordering</text>
</g>

<path d="M1199 639v24" class="arrow"/><path d="M1190 656l9 10 9-10" fill="none" stroke="#7b4a8f" stroke-width="4"/>

<g>
  <rect x="864" y="668" width="670" height="112" rx="20" class="card"/>
  <rect x="890" y="695" width="112" height="62" rx="8" fill="#f7f2f9" stroke="#6e3b80" stroke-width="3"/>
  <line x1="946" y1="695" x2="946" y2="757" stroke="#9a7aa7" stroke-width="2"/>
  <circle cx="925" cy="727" r="16" fill="none" stroke="#168c95" stroke-width="4"/>
  <line x1="913" y1="739" x2="902" y2="750" stroke="#168c95" stroke-width="5"/>
  <circle cx="1018" cy="698" r="16" fill="#ef7b31"/><text x="1013" y="704" class="step">4</text>
  <text x="1050" y="707" class="h">Read-only internal review</text>
  <text x="1050" y="735" class="p">Inspect seller evidence and machine observations separately.</text>
  <rect x="1050" y="748" width="142" height="26" rx="13" fill="#f1e8f5" stroke="#9a7aa7"/>
  <text x="1064" y="766" class="badge">Changes requested</text>
  <rect x="1204" y="748" width="184" height="26" rx="13" fill="#e7f7f3" stroke="#31b2ad"/>
  <text x="1218" y="766" class="badge">Internally accepted</text>
</g>

<rect x="64" y="824" width="1470" height="48" rx="16" fill="#2b163a"/>
<text x="88" y="854" style="font:700 17px Arial,sans-serif;fill:#fff">Boundary:</text>
<text x="186" y="854" style="font:400 16px Arial,sans-serif;fill:#fff">Internal review is not TTB, COLA, government, legal, or regulatory approval. Official determinations remain outside this prototype.</text>
</svg>