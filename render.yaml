# Render blueprint for the Label Lens TTB domestic-wine pre-check.
#
# This is the recommended path: a persistent Node web service that Render builds
# and starts directly from GitHub, with automatic PR preview environments for
# trusted testers and controlled redeploys of production on merges to `main`.
#
# The app needs a persistent Node 22 server with the native `sharp` and WebAssembly
# Tesseract OCR runtime (all vendored/traced at build time — no network OCR). It
# writes nothing to disk, so no persistent volume is required.
#
# REQUIRED secret (set in the Render dashboard, never committed):
#   LABEL_LENS_APPEND_SIGNING_KEY  — >= 32 chars; the pre-check route issues an
#   append-authorization token on every run, so production returns HTTP 500 until
#   this is set. See docs/deployment.md.
services:
  - type: web
    name: label-lens-ttb
    runtime: node
    plan: free # 512 MB; spins down when idle. Upgrade to `starter` for no spin-down.
    region: oregon
    branch: main # production tracks main; merges trigger a controlled redeploy
    # NODE_ENV=production (below) makes npm omit devDependencies by default, but
    # the build toolchain (TypeScript, Next's type/alias plumbing, etc.) lives in
    # devDependencies. Without them `next build` cannot consume the tsconfig path
    # aliases and every `@/...` import fails to resolve. `--include=dev` forces the
    # build dependencies to install; NODE_ENV stays production for the runtime.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start # `next start`; binds to Render's $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    previews:
      generation: automatic # per-PR preview deployments for staging/tester use
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Required, secret. Set the value in the Render dashboard (Environment tab)
      # or via `render secrets`. Not synced from this file.
      - key: LABEL_LENS_APPEND_SIGNING_KEY
        sync: false
      # Optional explicit override for export provenance. When omitted, Render's
      # automatic RENDER_GIT_COMMIT environment variable is used if available.
      - key: LABEL_LENS_BUILD_COMMIT
        sync: false
      # Temporary bounded server-side tracing for Issue #125. No image bytes,
      # declared values, secrets, private paths, or stack traces are emitted.
      - key: LABEL_LENS_PRECHECK_DIAGNOSTICS
        value: "1"
