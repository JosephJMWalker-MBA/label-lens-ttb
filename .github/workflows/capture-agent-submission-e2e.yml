name: Capture agent submission validation failures

on:
  push:
    branches:
      - agent/submit-to-review-queue

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/submit-to-review-queue
      - name: Capture failed validation output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          curl --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JosephJMWalker-MBA/label-lens-ttb/actions/jobs/88291248648/logs \
            2>&1 | tail -n 350 > .agent-submission-unit-failure.log
          printf '\nlog-capture-exit=%s\n' "$?" >> .agent-submission-unit-failure.log
          curl --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JosephJMWalker-MBA/label-lens-ttb/actions/jobs/88291248684/logs \
            2>&1 | tail -n 350 > .agent-submission-e2e-failure.log
          printf '\nlog-capture-exit=%s\n' "$?" >> .agent-submission-e2e-failure.log
          set -e
      - name: Commit captured output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent-submission-unit-failure.log .agent-submission-e2e-failure.log
          git commit -m "Capture agent submission validation failures"
          git push origin HEAD:agent/submit-to-review-queue
