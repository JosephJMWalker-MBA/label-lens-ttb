# One-time diagnostic; removed immediately after the failed assertion is identified.
name: Capture PR 148 Playwright failure

on:
  pull_request:

permissions:
  actions: read
  issues: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - name: Post failed Playwright tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JosephJMWalker-MBA/label-lens-ttb/actions/jobs/88449251570/logs \
            > /tmp/playwright.log
          tail -n 450 /tmp/playwright.log > /tmp/playwright-tail.log
          python - <<'PY'
          import json
          from pathlib import Path
          text = Path('/tmp/playwright-tail.log').read_text(errors='replace')
          body = "Temporary Playwright failure details for PR #148:\n\n```text\n" + text[-50000:] + "\n```"
          Path('/tmp/comment.json').write_text(json.dumps({'body': body}))
          PY
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JosephJMWalker-MBA/label-lens-ttb/issues/148/comments \
            --data-binary @/tmp/comment.json
