# One-time diagnostic; removed immediately after the failed assertion is identified.
name: Reproduce PR 148 Playwright failure

on:
  pull_request:

permissions:
  contents: write

jobs:
  reproduce:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: file:.local/e2e-auth.db
      BETTER_AUTH_SECRET: e2e-secret-key-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      LABEL_LENS_INTEGRITY_SECRET: e2e-integrity-secret-at-least-32-characters
      LABEL_LENS_APPEND_SIGNING_KEY: e2e-append-signing-secret-at-least-32-chars
      LABEL_LENS_BOOTSTRAP_ADMIN_EMAIL: e2e-admin@example.test
      LABEL_LENS_BOOTSTRAP_ADMIN_PASSWORD: e2e-only-admin-password-1234
      LABEL_LENS_BOOTSTRAP_AGENT_EMAIL: e2e-agent@example.test
      LABEL_LENS_BOOTSTRAP_AGENT_PASSWORD: e2e-only-agent-password-1234
      LABEL_LENS_BOOTSTRAP_SELLER_EMAIL: e2e-seller@example.test
      LABEL_LENS_BOOTSTRAP_SELLER_PASSWORD: e2e-only-seller-password-1234
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/allow-reviewed-agent-submission
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:seed
      - name: Reproduce and capture failure
        run: |
          set +e
          npm run test:e2e > /tmp/pr148-e2e.log 2>&1
          status=$?
          set -e
          {
            echo "exit_status=${status}"
            echo
            tail -n 650 /tmp/pr148-e2e.log
          } > .pr148-e2e-failure.log
      - name: Commit concise failure log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pr148-e2e-failure.log
          git commit -m "Record PR 148 Playwright failure"
          git push origin HEAD:fix/allow-reviewed-agent-submission
