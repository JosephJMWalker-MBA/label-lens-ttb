# One-time branch patch; removed before merge.
name: Apply reviewed agent submission fix

on:
  push:
    branches:
      - fix/allow-reviewed-agent-submission

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/allow-reviewed-agent-submission
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply focused fix
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected source block missing in {path}")
              file.write_text(text.replace(old, new, 1))

          model = Path("src/features/package-preparation/package-model.ts")
          if "export function packageReadyForAgentReview" not in model.read_text():
              replace_once(
                  str(model),
                  '''const NON_MATERIAL_POST_ANALYSIS_ACTIONS: ReadonlySet<SellerPackageChangeAction> = new Set([\n  "draft_saved",\n  "analysis_completed",\n  "agent_package_exported",\n]);\n''',
                  '''const NON_MATERIAL_POST_ANALYSIS_ACTIONS: ReadonlySet<SellerPackageChangeAction> = new Set([\n  "draft_saved",\n  "analysis_completed",\n  "agent_package_exported",\n]);\n\nconst LEGACY_SELLER_DISCREPANCY_ACKNOWLEDGEMENT =\n  "machine discrepancy reviewed; seller evidence deliberately kept unchanged";\n\n/**\n * The original workstation recorded a deliberate keep-evidence decision as a\n * generic category_updated entry. Preserve those existing browser drafts while\n * treating only this exact, non-mutating disposition as post-analysis metadata.\n */\nexport function isSellerDiscrepancyAcknowledgement(change: SellerPackageChange): boolean {\n  return (\n    change.action === "category_updated" &&\n    change.detail.toLowerCase().includes(LEGACY_SELLER_DISCREPANCY_ACKNOWLEDGEMENT)\n  );\n}\n''',
              )
              replace_once(
                  str(model),
                  '''  return draft.sellerChangeHistory\n    .filter((change) => change.sequence > latestRun.sellerChangeSequence)\n    .every((change) => NON_MATERIAL_POST_ANALYSIS_ACTIONS.has(change.action));\n}\n''',
                  '''  return draft.sellerChangeHistory\n    .filter((change) => change.sequence > latestRun.sellerChangeSequence)\n    .every(\n      (change) =>\n        NON_MATERIAL_POST_ANALYSIS_ACTIONS.has(change.action) ||\n        isSellerDiscrepancyAcknowledgement(change),\n    );\n}\n\n/**\n * Agent review is the destination for unresolved machine disagreement, not a\n * reward reserved for machine-perfect packages. A package may be handed off\n * when its latest analysis is still current and either the machine found no\n * issues or the seller explicitly reviewed every flagged category and kept the\n * underlying evidence unchanged.\n */\nexport function packageReadyForAgentReview(draft: SellerPackageDraft): boolean {\n  const latestRun = draft.analysisRuns.at(-1);\n  if (!latestRun || !latestAnalysisIsCurrent(draft)) return false;\n  if (latestRun.readiness === "ready_for_agent_submission") return true;\n\n  const flaggedCategoryIds = latestRun.categories\n    .filter(\n      (category) =>\n        category.state !== "clearly_readable" && category.state !== "not_applicable",\n    )\n    .map((category) => category.categoryId);\n  if (flaggedCategoryIds.length === 0) return false;\n\n  return flaggedCategoryIds.every((categoryId) =>\n    draft.sellerChangeHistory.some(\n      (change) =>\n        change.sequence > latestRun.sellerChangeSequence &&\n        change.categoryId === categoryId &&\n        isSellerDiscrepancyAcknowledgement(change),\n    ),\n  );\n}\n''',
              )
              replace_once(
                  str(model),
                  '''  if (readiness !== "ready_for_agent_submission" || !latestAnalysisIsCurrent(args.draft)) {\n    throw new Error("PACKAGE_NOT_READY_FOR_AGENT_SUBMISSION");\n  }\n''',
                  '''  if (!packageReadyForAgentReview(args.draft)) {\n    throw new Error("PACKAGE_NOT_READY_FOR_AGENT_SUBMISSION");\n  }\n''',
              )

          workflow = Path("src/features/package-preparation/package-workflow.ts")
          if "packageReadyForAgentReview" not in workflow.read_text():
              replace_once(
                  str(workflow),
                  '''  latestAnalysisIsCurrent,\n  packagePanelDecisions,\n''',
                  '''  latestAnalysisIsCurrent,\n  packagePanelDecisions,\n  packageReadyForAgentReview,\n''',
              )
              replace_once(
                  str(workflow),
                  '''  const readyForAgentPackage =\n    latestRun?.readiness === "ready_for_agent_submission" &&\n    analysisCurrent &&\n    args.saveState === "saved";\n''',
                  '''  const readyForAgentPackage =\n    packageReadyForAgentReview(draft) && args.saveState === "saved";\n''',
              )

          dock = Path("src/features/package-preparation/AgentReviewSubmissionDock.tsx")
          if "packageReadyForAgentReview" not in dock.read_text():
              replace_once(
                  str(dock),
                  '''import { buildSellerPackageExport, latestAnalysisIsCurrent } from "./package-model";\n''',
                  '''import {\n  buildSellerPackageExport,\n  latestAnalysisIsCurrent,\n  packageReadyForAgentReview,\n} from "./package-model";\n''',
              )
              replace_once(
                  str(dock),
                  '''  if (latestRun.readiness !== "ready_for_agent_submission") {\n    return "Review the flagged evidence, save the corrections, and run the pre-check again.";\n  }\n''',
                  '''  if (!packageReadyForAgentReview(stored.draft)) {\n    return "Review each category flagged by the pre-check. Correct the evidence or explicitly keep it for the human agent.";\n  }\n''',
              )
              replace_once(
                  str(dock),
                  '''  const ready = Boolean(\n    stored &&\n    latestRun?.readiness === "ready_for_agent_submission" &&\n    latestAnalysisIsCurrent(stored.draft) &&\n    stored.panelFiles.length === stored.draft.panels.length,\n  );\n''',
                  '''  const ready = Boolean(\n    stored &&\n    packageReadyForAgentReview(stored.draft) &&\n    stored.panelFiles.length === stored.draft.panels.length,\n  );\n''',
              )

          finalize = Path("src/app/api/package/submit/finalize/route.ts")
          if "packageReadyForAgentReview" not in finalize.read_text():
              replace_once(
                  str(finalize),
                  '''import { latestAnalysisIsCurrent } from "@/features/package-preparation/package-model";\n''',
                  '''import {\n  latestAnalysisIsCurrent,\n  packageReadyForAgentReview,\n} from "@/features/package-preparation/package-model";\n''',
              )
              replace_once(
                  str(finalize),
                  '''  const latestRun = draft.analysisRuns.at(-1);\n  if (!latestRun || latestRun.readiness !== "ready_for_agent_submission") {\n    return NextResponse.json(\n      {\n        error:\n          "Bad Request: Package is not ready. Analysis status must be ready_for_agent_submission.",\n      },\n      { status: 400 },\n    );\n  }\n''',
                  '''  const latestRun = draft.analysisRuns.at(-1);\n  if (!latestRun || !packageReadyForAgentReview(draft)) {\n    return NextResponse.json(\n      {\n        error:\n          "Bad Request: Package is not ready. Every machine-flagged category must be corrected or explicitly kept for human agent review.",\n      },\n      { status: 400 },\n    );\n  }\n''',
              )

          tests = Path("src/features/package-preparation/package-workflow.test.ts")
          if "allows human-agent handoff" not in tests.read_text():
              anchor = '''  it("distinguishes stale readiness from a current local-export-ready run", () => {\n'''
              addition = '''  it("allows human-agent handoff after the seller explicitly keeps flagged evidence unchanged", () => {\n    const value = draft();\n    addPanels(value);\n    acceptCategories(value);\n    value.analysisRuns = [\n      {\n        analysisRunId: "analysis-1",\n        sequence: 1,\n        sellerChangeSequence: 0,\n        recordedAt: "2026-07-18T01:00:00.000Z",\n        panelRuns: [],\n        categories: [\n          {\n            categoryId: "brandName",\n            state: "clearly_readable",\n            observedValue: "CEDAR RIDGE",\n            supportingPanelIds: ["front-panel"],\n            supportingRegionIds: ["brandName-region"],\n            reason: "Clear.",\n          },\n          {\n            categoryId: "alcoholStatement",\n            state: "needs_review",\n            observedValue: "12%",\n            supportingPanelIds: [],\n            supportingRegionIds: [],\n            reason: "Seller and machine evidence differ.",\n          },\n        ],\n        readiness: "needs_seller_review",\n      },\n    ];\n    value.sellerChangeHistory.push({\n      changeId: "alcohol-kept",\n      sequence: 1,\n      recordedAt: "2026-07-18T02:00:00.000Z",\n      action: "category_updated",\n      categoryId: "alcoholStatement",\n      detail:\n        "Alcohol statement machine discrepancy reviewed; seller evidence deliberately kept unchanged.",\n    });\n\n    expect(project(value, "saved")).toMatchObject({\n      phase: "prepare",\n      analysisCurrent: true,\n      correctionCycleComplete: true,\n      readyForAgentPackage: true,\n      recommendedAction: "Prepare the local-only agent package",\n    });\n  });\n\n'''
              replace_once(str(tests), anchor, addition + anchor)
          PY
      - run: npm ci
      - name: Format and validate focused workflow tests
        run: |
          npx prettier --write \
            src/features/package-preparation/package-model.ts \
            src/features/package-preparation/package-workflow.ts \
            src/features/package-preparation/AgentReviewSubmissionDock.tsx \
            src/app/api/package/submit/finalize/route.ts \
            src/features/package-preparation/package-workflow.test.ts
          npx vitest run src/features/package-preparation/package-workflow.test.ts
          npm run typecheck
      - name: Commit fix
        run: |
          if git diff --quiet; then
            echo "Fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/package-preparation/package-model.ts \
            src/features/package-preparation/package-workflow.ts \
            src/features/package-preparation/AgentReviewSubmissionDock.tsx \
            src/app/api/package/submit/finalize/route.ts \
            src/features/package-preparation/package-workflow.test.ts
          git commit -m "Allow reviewed discrepancies into agent queue"
          git push origin HEAD:fix/allow-reviewed-agent-submission
