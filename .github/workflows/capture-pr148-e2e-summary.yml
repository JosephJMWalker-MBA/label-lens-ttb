name: Capture PR 148 E2E summary

on:
  pull_request:

permissions:
  contents: write

jobs:
  reproduce:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/allow-reviewed-agent-submission
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Load existing test-only E2E environment
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path('.github/workflows/ci.yml').read_text()
          section = text.split('\n  e2e:\n', 1)[1]
          keys = [
              'DATABASE_URL',
              'BETTER_AUTH_SECRET',
              'BETTER_AUTH_URL',
              'LABEL_LENS_INTEGRITY_SECRET',
              'LABEL_LENS_APPEND_SIGNING_KEY',
              'LABEL_LENS_BOOTSTRAP_ADMIN_EMAIL',
              'LABEL_LENS_BOOTSTRAP_ADMIN_PASSWORD',
              'LABEL_LENS_BOOTSTRAP_AGENT_EMAIL',
              'LABEL_LENS_BOOTSTRAP_AGENT_PASSWORD',
              'LABEL_LENS_BOOTSTRAP_SELLER_EMAIL',
              'LABEL_LENS_BOOTSTRAP_SELLER_PASSWORD',
          ]
          with open(os.environ['GITHUB_ENV'], 'a') as output:
              for key in keys:
                  match = re.search(rf'^\s+{key}:\s*(.+)$', section, re.MULTILINE)
                  if not match:
                      raise SystemExit(f'Missing E2E environment key: {key}')
                  print(f'{key}={match.group(1).strip()}', file=output)
          PY
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:seed
      - name: Reproduce and sanitize failure
        run: |
          set +e
          npm run test:e2e > /tmp/pr148-e2e-output.txt 2>&1
          status=$?
          set -e
          {
            echo "exit_status=${status}"
            echo
            grep -n -E "failed|FAILED|Error:|Timeout|expect\(|locator\(|tests/e2e|×|✘|❯" /tmp/pr148-e2e-output.txt | tail -n 350 || true
          } > .pr148-e2e-summary.txt
      - name: Commit sanitized summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pr148-e2e-summary.txt
          git commit -m "Record sanitized PR 148 E2E failure"
          git push origin HEAD:fix/allow-reviewed-agent-submission
