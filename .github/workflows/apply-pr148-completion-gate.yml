name: Apply PR 148 completion gate

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/allow-reviewed-agent-submission
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Gate completion copy on reviewed dispositions
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/package-preparation/PackagePreparationWorkspace.tsx')
          text = path.read_text()
          old = 'latestRun && !analysisCurrent && saveState !== "saved"'
          new = 'workflow.correctionCycleComplete && saveState !== "saved"'
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'Expected two completion gates, found {count}')
          path.write_text(text.replace(old, new))
          PY
          npx prettier --write src/features/package-preparation/PackagePreparationWorkspace.tsx
          rm .github/workflows/apply-pr148-completion-gate.yml
      - name: Run focused regression test
        run: npx vitest run src/features/package-preparation/PackagePreparationWorkspace.test.tsx
      - name: Commit validated completion gate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Show reviewed completion before final save"
          git push origin HEAD:fix/allow-reviewed-agent-submission
