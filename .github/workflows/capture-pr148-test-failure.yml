# One-time diagnostic workflow; removed before merge.
name: Capture PR 148 unit failure

on:
  pull_request:

permissions:
  actions: read
  issues: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - name: Capture failed test output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JosephJMWalker-MBA/label-lens-ttb/actions/jobs/88440217637/logs \
            > /tmp/pr148-unit.log
          {
            echo "=== FAILURE INDEX ==="
            grep -n -E "FAIL|AssertionError|expected|received|Test Files|Tests|Error:|×|❯" /tmp/pr148-unit.log | tail -n 180 || true
            echo
            echo "=== LOG TAIL ==="
            tail -n 280 /tmp/pr148-unit.log
          } > /tmp/pr148-summary.log
          python - <<'PY'
          import json
          from pathlib import Path
          text = Path('/tmp/pr148-summary.log').read_text(errors='replace')
          body = "Temporary diagnostic output for PR #148:\n\n```text\n" + text[-50000:] + "\n```"
          Path('/tmp/pr148-comment.json').write_text(json.dumps({'body': body}))
          PY
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JosephJMWalker-MBA/label-lens-ttb/issues/148/comments \
            --data-binary @/tmp/pr148-comment.json
