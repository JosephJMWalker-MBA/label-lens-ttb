name: Format PR 148

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/allow-reviewed-agent-submission
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply repository formatting
        run: |
          npx prettier --write \
            src/features/package-preparation/package-workflow.ts \
            src/features/package-preparation/PackageProgressFooter.tsx
          rm -f .github/workflows/format-pr148.yml
      - name: Commit formatted product files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format reviewed agent submission fix"
          git push origin HEAD:fix/allow-reviewed-agent-submission
